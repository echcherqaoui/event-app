<!DOCTYPE html>
<html>
    <head>
        <style>
            body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
            .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
            .header { background: #1a73e8; color: #ffffff; padding: 30px; text-align: center; }
            .content { padding: 30px; line-height: 1.6; color: #3c4043; }
            .footer { background: #f8f9fa; padding: 20px; text-align: center; font-size: 12px; color: #70757a; }
            .button { display: inline-block; padding: 12px 24px; background-color: #1a73e8; color: white !important; text-decoration: none; border-radius: 4px; font-weight: bold; margin-top: 20px; }
        </style>
    </head>
<body>
<div class="container">
    <div class="header"><h1>Booking Confirmed</h1></div>
    <div class="content">
        <p>Hi there,</p>
        <p>Your booking <strong>#[[${bookingId}]]</strong> has been successfully processed. We've attached your receipt to this email.</p>
        <p><strong>Amount Paid:</strong> [[${amount}]] [[${currency}]]</p>
        <a href="#" class="button">View Booking Details</a>
    </div>
    <div class="footer">&copy; 2026 Booking W. All rights reserved.</div>
</div>
</body>
</html>

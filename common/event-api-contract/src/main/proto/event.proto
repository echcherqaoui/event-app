syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.eventapp.lib.event.v1";

service EventService {
  rpc GetEventPrice (GetEventPriceRequest) returns (GetEventPriceResponse);
}

message GetEventPriceRequest {
  int64 eventId = 1;
}

message GetEventPriceResponse {
  int64 eventId = 1;
  string price = 2;
}
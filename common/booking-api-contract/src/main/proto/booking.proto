syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.eventapp.lib.booking.v1";
option java_outer_classname = "BookingProto";

service BookingService {
  rpc VerifyBooking (BookingRequest) returns (BookingResponse);
}

message BookingRequest {
  string bookingId = 1;
}

message BookingResponse {
  string bookingId = 1;
  int64 eventId = 2;
  string userId = 3;
  string email = 4;
  int32 quantity = 5;
  string price = 6;
  string totalPrice = 7;
}
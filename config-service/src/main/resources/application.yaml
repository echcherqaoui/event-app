server:
  port: 8888

spring:
  application:
    name: config-service

  profiles:
    active: git
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URL}
          username: ${CONFIG_REPO_USER}
          password: ${CONFIG_REPO_PASSWORD}
          default-label: main
      discovery:
        enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
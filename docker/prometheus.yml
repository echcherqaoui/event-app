scrape_configs:

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'api-gateway:8090' ]
    relabel_configs:
      - source_labels: [job]
        target_label: application

  - job_name: 'booking-service'
